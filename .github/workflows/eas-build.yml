# ═══════════════════════════════════════════════════════════════
# Anzaro AI — EAS Cloud Build Pipeline (No-Computer Architecture)
# ═══════════════════════════════════════════════════════════════
# Triggers on push to main. Builds Android APK on GitHub's cloud runners.
# Requires EXPO_TOKEN secret in GitHub Repository Settings.
# ═══════════════════════════════════════════════════════════════

name: Anzaro Mobile — EAS Build

on:
  push:
    branches: [main]
    paths:
      - 'mobile-app/**'
      - '.github/workflows/eas-build.yml'
  workflow_dispatch:
    inputs:
      profile:
        description: 'Build profile (preview/production)'
        required: true
        default: 'preview'
      platform:
        description: 'Platform (android/ios)'
        required: true
        default: 'android'

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: mobile-app

    steps:
      # ─── 1. Checkout code ───
      - name: 📦 Checkout repository
        uses: actions/checkout@v4

      # ─── 2. Setup Node.js ───
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile-app/package-lock.json

      # ─── 3. Setup Java (for Android builds) ───
      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ─── 4. Setup Expo ───
      - name: 📱 Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      # ─── 5. Install dependencies ───
      - name: 📥 Install dependencies
        run: npm install --legacy-peer-deps

      # ─── 6. Type check ───
      - name: 🔍 Type check
        run: npx tsc --noEmit || true
        continue-on-error: true

      # ─── 7. Build APK via EAS ───
      - name: 🚀 Build Android APK
        run: |
          PROFILE="${{ github.event.inputs.profile || 'preview' }}"
          echo "Building with profile: $PROFILE"
          eas build --profile $PROFILE --platform android --non-interactive --no-wait
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      # ─── 8. Get build URL ───
      - name: 🔗 Get build URL
        run: |
          echo "✅ Build triggered successfully!"
          echo "📱 Check your build status at:"
          echo "   https://expo.dev/accounts/YOUR_EXPO_ACCOUNT/projects/anzaro-mobile/builds"
          echo ""
          echo "📥 Once complete, the APK download link will be available at the URL above."
          echo "⏱️ Build typically takes 5-10 minutes on GitHub's cloud runners."
