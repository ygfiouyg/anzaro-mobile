name: Build Anzaro APK

on:
  push:
    branches: [main]
    paths:
      - 'mobile-app/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install deps
        working-directory: mobile-app
        run: npm install --legacy-peer-deps

      - name: Build APK
        working-directory: mobile-app
        run: eas build --profile preview --platform android --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Get APK URL
        working-directory: mobile-app
        run: |
          BUILD_URL=$(eas build:list --platform android --limit 1 --json | jq -r '.[0].artifacts.buildUrl')
          echo "APK_URL=$BUILD_URL" >> $GITHUB_ENV
          echo "::notice::APK Download URL: $BUILD_URL"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: anzaro-apk
          path: mobile-app/*.apk
          if-no-files-found: ignore
